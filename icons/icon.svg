<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background: dark forest, lighter corner for depth -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#162B14"/>
      <stop offset="100%" stop-color="#050908"/>
    </linearGradient>

    <!-- Bolt: bright white top → warm gold bottom -->
    <linearGradient id="bolt" x1="280" y1="78" x2="210" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#FFF2D0"/>
      <stop offset="100%" stop-color="#E8C040"/>
    </linearGradient>

    <!-- Amber halo behind bolt -->
    <radialGradient id="halo" cx="245" cy="255" r="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D4940A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D4940A" stop-opacity="0"/>
    </radialGradient>

    <!-- Green ring gradient -->
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7EC86A"/>
      <stop offset="100%" stop-color="#3A5232"/>
    </linearGradient>

    <!-- Soft amber glow on the bolt -->
    <filter id="glow" x="-50%" y="-40%" width="200%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.88
                0 0 0 0 0.60
                0 0 0 0 0.04
                0 0 0 0.80 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Green arc ring — ~300° sweep, open at bottom-right, suggesting a sun -->
  <circle cx="256" cy="248" r="175"
    fill="none" stroke="url(#ring)" stroke-width="14"
    stroke-linecap="round"
    stroke-dasharray="990 110" stroke-dashoffset="275"
    opacity="0.55"/>

  <!-- Amber halo shaped to the bolt — wide at top, narrow at bottom -->
  <path d="M292 78 L148 274 H238 L208 432 L364 232 H278 Z"
    fill="#D4940A" opacity="0.18" filter="url(#glow)"/>
  <path d="M292 78 L148 274 H238 L208 432 L364 232 H278 Z"
    fill="#FF8800" opacity="0.10" filter="url(#glow)"/>

  <!-- Lightning bolt — main focal element -->
  <path d="M292 78
           L148 274
           H238
           L208 432
           L364 232
           H278
           Z"
    fill="url(#bolt)" filter="url(#glow)"/>
</svg>
